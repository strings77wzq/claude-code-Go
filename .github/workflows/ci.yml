name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        run: |
          fmt_output=$(gofmt -l .)
          if [ -n "$fmt_output" ]; then
            echo "The following files need formatting:"
            echo "$fmt_output"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...

      - name: Build binary
        run: go build -o bin/go-code ./cmd/go-code

  python-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r harness/requirements.txt
          pip install -e .

      - name: Build Go binary
        run: go build -o bin/go-code ./cmd/go-code

      - name: Run Python tests
        run: |
          mkdir -p harness/logs
          pytest harness/ -v --tb=short | tee harness/logs/pytest.log

      - name: Upload harness logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: harness-logs
          path: harness/logs/
          retention-days: 7

  build-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build for linux/amd64
        run: GOOS=linux GOARCH=amd64 go build -o bin/go-code-linux-amd64 ./cmd/go-code

      - name: Build for darwin/amd64
        run: GOOS=darwin GOARCH=amd64 go build -o bin/go-code-darwin-amd64 ./cmd/go-code

      - name: Build for darwin/arm64
        run: GOOS=darwin GOARCH=arm64 go build -o bin/go-code-darwin-arm64 ./cmd/go-code

      - name: Build for windows/amd64
        run: GOOS=windows GOARCH=amd64 go build -o bin/go-code-windows-amd64.exe ./cmd/go-code

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        run: |
          cd docs
          npm ci

      - name: Build docs
        run: |
          cd docs
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: claude-code-go:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
