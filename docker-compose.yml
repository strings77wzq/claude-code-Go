version: '3.8'

services:
  go-code:
    build: .
    container_name: claude-code-go
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
    volumes:
      - ./workspace:/home/gocode/workspace
      - go-code-sessions:/home/gocode/.go-code/sessions
    working_dir: /home/gocode/workspace
    stdin_open: true
    tty: true
    command: ["go-code"]

volumes:
  go-code-sessions:
